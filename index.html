<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PeixeScan Legal</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top center, rgba(196, 220, 239, 0.5), transparent 420px),
          #f4f8fc;
      }

      .brand img {
        display: block;
        width: min(320px, 80vw);
        height: auto;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="brand">
        <img src="assets/logo.png" alt="PeixeScan" />
      </header>
    </main>
  </body>
</html>
